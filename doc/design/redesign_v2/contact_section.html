<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Jesús Pérez Portfolio Contact Section</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0de3f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#14142B",
                        "card-dark": "#1A1A2E",
                        "input-dark": "#14142B",
                        "border-dark": "#2A2A4A",
                        "text-muted": "#9CA3AF"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body text-slate-900 dark:text-slate-100 min-h-screen antialiased selection:bg-primary/30 selection:text-primary overflow-x-hidden">
<!-- Top Nav Bar -->
<header class="w-full flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark px-10 py-5 bg-card-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-4 text-white">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 18.4228L42 11.475V34.3663C42 34.7796 41.7457 35.1504 41.3601 35.2992L24 42V18.4228Z" fill="currentColor" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-white text-xl font-display font-bold leading-tight tracking-tight">Jesús Pérez</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<nav class="flex items-center gap-9">
<a class="text-text-muted hover:text-white transition-colors text-sm font-medium leading-normal" href="#">Home</a>
<a class="text-text-muted hover:text-white transition-colors text-sm font-medium leading-normal" href="#">About</a>
<a class="text-text-muted hover:text-white transition-colors text-sm font-medium leading-normal" href="#">Projects</a>
<a class="text-primary text-sm font-medium leading-normal" href="#">Contact</a>
</nav>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-5 bg-primary/10 hover:bg-primary/20 border border-primary/30 text-primary text-sm font-bold leading-normal transition-all duration-300">
<span class="truncate">Resume</span>
</button>
</div>
</header>
<!-- Main Contact Section -->
<main class="w-full max-w-[1440px] mx-auto py-[120px] px-8 lg:px-20">
<div class="max-w-[1000px] mx-auto flex flex-col items-center">
<!-- Section Header -->
<div class="flex flex-col items-center mb-16 w-full">
<h4 class="text-primary text-[14px] font-bold font-display uppercase tracking-widest mb-3 text-center">LET'S CONNECT</h4>
<h1 class="text-white text-[48px] font-display font-bold leading-tight text-center mb-6">Get In Touch</h1>
<div class="h-1 w-24 bg-gradient-to-r from-transparent via-primary to-transparent rounded-full opacity-70"></div>
</div>
<!-- Two-Column Layout -->
<div class="flex flex-col lg:flex-row w-full gap-12 lg:gap-16">
<!-- Left Column (40%) -->
<div class="w-full lg:w-[40%] flex flex-col gap-10">
<!-- Contact Info -->
<div>
<h3 class="text-white text-[20px] font-display font-bold leading-tight mb-6">Contact Info</h3>
<div class="flex flex-col gap-6">
<!-- Location -->
<div class="flex items-start gap-4 p-4 rounded-xl hover:bg-card-dark/50 transition-colors border border-transparent hover:border-border-dark">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12 shadow-[0_0_15px_rgba(13,227,242,0.15)]">
<span class="material-symbols-outlined text-[24px]">location_on</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-text-muted text-sm font-medium leading-normal mb-1">Location</p>
<p class="text-white text-base font-medium leading-normal">San Francisco, CA</p>
</div>
</div>
<!-- Email -->
<div class="flex items-start gap-4 p-4 rounded-xl hover:bg-card-dark/50 transition-colors border border-transparent hover:border-border-dark">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12 shadow-[0_0_15px_rgba(13,227,242,0.15)]">
<span class="material-symbols-outlined text-[24px]">mail</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-text-muted text-sm font-medium leading-normal mb-1">Email</p>
<p class="text-white text-base font-medium leading-normal">hello@jesusperez.dev</p>
</div>
</div>
<!-- Phone -->
<div class="flex items-start gap-4 p-4 rounded-xl hover:bg-card-dark/50 transition-colors border border-transparent hover:border-border-dark">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12 shadow-[0_0_15px_rgba(13,227,242,0.15)]">
<span class="material-symbols-outlined text-[24px]">call</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-text-muted text-sm font-medium leading-normal mb-1">Phone</p>
<p class="text-white text-base font-medium leading-normal">+1 (555) 123-4567</p>
</div>
</div>
</div>
</div>
<!-- Follow Me -->
<div>
<h3 class="text-white text-[20px] font-display font-bold leading-tight mb-6">Follow Me</h3>
<div class="flex items-center gap-4">
<!-- GitHub (Hover State) -->
<a class="flex items-center justify-center size-12 rounded-full bg-card-dark text-white border border-primary shadow-[0_0_15px_rgba(13,227,242,0.3)] transition-all" href="#">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12C2 16.42 4.873 19.51 8.828 20.61C9.328 20.7 9.5 20.39 9.5 20.13C9.5 19.9 9.49 19.38 9.485 18.7C6.703 19.3 6.117 17.36 6.117 17.36C5.663 16.2 5.006 15.9 5.006 15.9C4.098 15.28 5.074 15.29 5.074 15.29C6.077 15.36 6.603 16.32 6.603 16.32C7.494 17.85 8.94 17.4 9.518 17.15C9.608 16.49 9.873 16.05 10.165 15.8C7.945 15.55 5.613 14.69 5.613 10.96C5.613 9.9 5.993 9.03 6.618 8.35C6.518 8.1 6.183 7.11 6.713 5.79C6.713 5.79 7.533 5.53 9.488 6.85C10.268 6.63 11.128 6.52 11.988 6.52C12.848 6.52 13.708 6.63 14.488 6.85C16.443 5.53 17.263 5.79 17.263 5.79C17.793 7.11 17.458 8.1 17.358 8.35C17.983 9.03 18.363 9.9 18.363 10.96C18.363 14.7 16.028 15.54 13.798 15.79C14.168 16.11 14.498 16.73 14.498 17.7C14.498 19.09 14.488 20.21 14.488 20.53C14.488 20.79 14.658 21.11 15.168 21.01C19.123 19.51 22 16.41 22 12C22 6.477 17.523 2 12 2Z" fill-rule="evenodd"></path>
</svg>
</a>
<!-- LinkedIn -->
<a class="flex items-center justify-center size-12 rounded-full bg-card-dark text-text-muted border border-border-dark hover:text-white hover:border-primary/50 hover:bg-card-dark/80 transition-all" href="#">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M20.447 20.452H16.92V14.881C16.92 13.55 16.895 11.84 15.068 11.84C13.218 11.84 12.934 13.284 12.934 14.786V20.452H9.407V8.995H12.793V10.562H12.842C13.313 9.668 14.464 8.73 16.181 8.73C19.754 8.73 20.447 11.082 20.447 14.167V20.452ZM5.337 7.433C4.21 7.433 3.303 6.525 3.303 5.399C3.303 4.272 4.21 3.364 5.337 3.364C6.463 3.364 7.37 4.272 7.37 5.399C7.37 6.525 6.463 7.433 5.337 7.433ZM7.103 20.452H3.57V8.995H7.103V20.452Z"></path>
</svg>
</a>
<!-- Twitter/X -->
<a class="flex items-center justify-center size-12 rounded-full bg-card-dark text-text-muted border border-border-dark hover:text-white hover:border-primary/50 hover:bg-card-dark/80 transition-all" href="#">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"></path>
</svg>
</a>
</div>
</div>
</div>
<!-- Right Column (60%) - Contact Form -->
<div class="w-full lg:w-[60%]">
<div class="bg-card-dark rounded-xl border border-border-dark p-8 md:p-[32px] shadow-2xl relative overflow-hidden">
<!-- Decorative gradient blob -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[50px] rounded-full pointer-events-none"></div>
<form class="flex flex-col gap-6 relative z-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium" for="name">Your Name</label>
<input class="bg-input-dark border border-border-dark rounded-[12px] h-[52px] px-4 text-white placeholder:text-text-muted/50 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none font-body" id="name" placeholder="John Doe" type="text"/>
</div>
<!-- Email Field (Focused State) -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium" for="email">Your Email</label>
<input class="bg-input-dark border border-primary rounded-[12px] h-[52px] px-4 text-white placeholder:text-text-muted/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body shadow-[0_0_10px_rgba(13,227,242,0.15)]" id="email" type="email" value="john@example.com"/>
</div>
</div>
<!-- Subject Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium" for="subject">Subject</label>
<input class="bg-input-dark border border-border-dark rounded-[12px] h-[52px] px-4 text-white placeholder:text-text-muted/50 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none font-body" id="subject" placeholder="Project Inquiry" type="text"/>
</div>
<!-- Message Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium" for="message">Your Message</label>
<textarea class="bg-input-dark border border-border-dark rounded-[12px] p-4 text-white placeholder:text-text-muted/50 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none resize-none font-body" id="message" placeholder="Tell me about your project..." rows="5"></textarea>
</div>
<!-- Submit Button -->
<button class="mt-4 flex items-center justify-center gap-2 w-full h-[56px] rounded-[12px] bg-gradient-to-r from-primary to-[#0ab5c2] hover:opacity-90 text-background-dark font-display font-bold text-base transition-all shadow-[0_4px_14px_rgba(13,227,242,0.3)] hover:shadow-[0_6px_20px_rgba(13,227,242,0.4)]" type="button">
                                Send Message
                                <span class="material-symbols-outlined text-[20px]">send</span>
</button>
</form>
</div>
</div>
</div>
</div>
</main>
